apiVersion: v1
kind: ConfigMap
metadata:
  name: myconfigmap
data:
  myscript.properties: |
    app_url: http://devops.com
    access_level: "1"
    teacher: "hamed farvardin"
    timeout: '10'
---
apiVersion: v1
kind: Pod
metadata:
  name: my-pod
spec:
  restartPolicy: Never
  containers:
  - name: ubuntu
    image: ubuntu
    volumeMounts:
    - name: config-volume
      mountPath: /myscript/temp
    args:
    - sleep
    - "3600"
  volumes:
  - name: config-volume
    configMap:
      name: myconfigmap